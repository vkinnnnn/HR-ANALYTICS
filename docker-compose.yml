version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hr-analytics-backend
    ports:
      - "8119:8119"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=sqlite:///./app.db
      - DATA_DIR=/app/wh_Dataset
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      - ./backend:/app
      - ./wh_Dataset:/app/wh_Dataset:ro
      - backend_data:/app/data
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8119
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8119/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - hr-analytics

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hr-analytics-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:8119
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
    networks:
      - hr-analytics

volumes:
  backend_data:

networks:
  hr-analytics:
    driver: bridge
